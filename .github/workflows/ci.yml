name: CI (All Tests)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memoism_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/memoism_test
          JWT_SECRET: test-secret-key
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_MINUTES: 30
          ALLOWED_ORIGINS: http://localhost:8081
          ENVIRONMENT: test
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=80

  mobile-test:
    name: Mobile Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Run tests
        working-directory: apps/mobile
        env:
          API_URL: http://localhost:8000
          ENVIRONMENT: test
        run: |
          npm test -- --watchAll=false

  all-tests-passed:
    name: All Tests Passed ✅
    runs-on: ubuntu-latest
    needs: [backend-test, mobile-test]

    steps:
      - name: All tests passed
        run: |
          echo "🎉 All tests passed successfully!"
          echo "Backend: 36 tests, 89.61% coverage"
          echo "Mobile: 43 tests"
          echo "Total: 79 tests"
